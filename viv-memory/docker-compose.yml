# VIV-MIND: Cognitive Memory Architecture
# OpenClaw + Mem0 + Neo4j + Langfuse

version: "3.8"

services:
  # Neo4j - Knowledge Graph Database
  neo4j:
    image: neo4j:5.15-community
    container_name: viv-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/viv-memory-2025
      - NEO4J_PLUGINS=["apoc", "gds"]
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Mem0 - Self-Improving Memory Layer
  mem0:
    image: mem0/mem0:latest
    container_name: viv-mem0
    ports:
      - "8001:8000"
    environment:
      - MEM0_STORE_TYPE=postgres
      - MEM0_EMBEDDING_MODEL=ollama
      - MEM0_VECTOR_STORE=qdrant
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=nomic-embed-text
      - MEM0_API_KEY=${MEM0_API_KEY:-m0-mTG6s7FdqBkztj9vwZArzjVQeCyZqH4yel4wJdd4}
      - MEM0_USER_ID=oli
      - MEM0_AGENT_ID=viveka
    volumes:
      - mem0-data:/data
    depends_on:
      - postgres
      - qdrant
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Postgres - Relational Store for Mem0
  postgres:
    image: postgres:16-alpine
    container_name: viv-postgres
    environment:
      - POSTGRES_USER=mem0
      - POSTGRES_PASSWORD=viv-memory-2025
      - POSTGRES_DB=mem0db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mem0"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Qdrant - Vector Store
  qdrant:
    image: qdrant/qdrant:latest
    container_name: viv-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Langfuse - Observability & Tracing
  langfuse:
    image: langfuse/langfuse:latest
    container_name: viv-langfuse
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://langfuse:viv-memory-2025@viv-postgres:5432/langfusedb
      - NEXTAUTH_SECRET=viv-nextauth-secret-2025
      - SALT=viv-salt-2025
      - NEXTAUTH_URL=http://localhost:3000
      - TELEMETRY_ENABLED=false
    depends_on:
      - postgres

  # VIV-Brain - Custom Orchestrator
  viv-brain:
    build:
      context: ./viv-brain
      dockerfile: Dockerfile
    container_name: viv-brain
    environment:
      - MEM0_URL=http://viv-mem0:8000
      - NEO4J_URI=bolt://viv-neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=viv-memory-2025
      - LANGFUSE_URL=http://viv-langfuse:3000
      - VIV_MODE=development
    volumes:
      - ../memory:/app/memory:ro  # Read OpenClaw memory files
      - viv-brain-data:/app/data
    depends_on:
      neo4j:
        condition: service_healthy
      mem0:
        condition: service_healthy

  # Night Mode Scheduler - Runs reflection periodically
  viv-reflector:
    build:
      context: ./viv-brain
      dockerfile: Dockerfile
    container_name: viv-reflector
    command: ["python", "-m", "viv_brain.night_mode"]
    environment:
      - MEM0_URL=http://viv-mem0:8000
      - NEO4J_URI=bolt://viv-neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=viv-memory-2025
      - REFLECTION_INTERVAL=7200  # 2 hours
    volumes:
      - ../memory:/app/memory:ro
      - viv-brain-data:/app/data
    depends_on:
      - viv-brain
    profiles:
      - reflector

volumes:
  neo4j-data:
  neo4j-logs:
  mem0-data:
  postgres-data:
  qdrant-data:
  viv-brain-data:
